name: dontlose
options:
  bundleIdPrefix: com.franlopz10
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    DEAD_CODE_STRIPPING: YES
targets:
  dontlose:
    type: application
    platform: macOS
    sources:
      - path: dontlose
    resources:
      - path: dontlose/Resources
        optional: true
    info:
      path: dontlose/Info.plist
      properties:
        CFBundleDisplayName: dontlose
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        NSHumanReadableCopyright: "Copyright © 2026 franlopz10. All rights reserved."
        NSMicrophoneUsageDescription: "dontlose does not use the microphone."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.franlopz10.dontlose
  dontloseTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: dontloseTests
    dependencies:
      - target: dontlose
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/dontlose.app/Contents/MacOS/dontlose"
schemes:
  dontlose:
    build:
      targets:
        dontlose: all
        dontloseTests: [test]
    test:
      gatherCoverageData: false
      targets:
        - dontloseTests
